<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorpresa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hearts" id="hearts"></div>

  <main>
    <section id="inicio" class="pantalla activa">
      <h1 class="titulo-animado">ABRIR LA SORPRESA</h1>
      <button id="btnAbrir" class="btn-abrir">abrir</button>
    </section>

    <section id="galeria" class="pantalla oculta">
      <h2>PARA EL AMOR DE MI VIDA</h2>
      <div class="acciones-juegos">
        <button id="btnJugar" class="btn-jugar" type="button">jugar</button>
        <button id="btnVof" class="btn-jugar" type="button">VOF</button>
      </div>
      <div class="juegos-superiores">
        <section id="juegoCrucigrama" class="juego-crucigrama oculta" aria-live="polite">
          <h3>CRUCIGRAMA</h3>
          <div id="crucigramaGrid" class="crucigrama-grid" role="grid" aria-label="Crucigrama 12x12"></div>
          <div id="listaPistas" class="lista-pistas"></div>
        </section>
        <section id="juegoVof" class="juego-vof oculta" aria-live="polite">
          <h3>VOF</h3>
          <div id="vofLista" class="vof-lista"></div>
          <p id="vofEstado" class="vof-estado"></p>
        </section>
      </div>
      <p class="te-amo">TE AMO</p>
      <div id="museo" class="museo"></div>
      <div class="mensaje-final">
        <p>Me haces mas feliz cada dia, te amo con toda mi alma.</p>
        <p>LLevo 3 meses enamorado, feliz, diviritiendome y compartiendo muchos lindos momentos con la persona que amo, y espero que sean muchos mas</p>
      </div>
    </section>
  </main>

  <audio id="musica" src="Piti Fernndez _ La Doctora II.mp3" loop></audio>

  <script src="script.js"></script>
</body>
</html>
